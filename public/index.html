<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Manager</title>
    <style>
        /* Essential CSS to make the switching work */
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; text-align: center; }
        .hidden { display: none !important; } /* This makes the sections hide/show */
        
        .role-buttons { margin: 20px; }
        button { padding: 10px 20px; cursor: pointer; margin: 5px; }
        .btn-user { background: #3498db; color: white; border: none; }
        .btn-admin { background: #e74c3c; color: white; border: none; }
        
        .event-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .event-card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; text-align: left; }
        .event-card img { max-width: 100%; height: auto; border-radius: 4px; }
        form { display: flex; flex-direction: column; gap: 10px; max-width: 400px; margin: 0 auto; }
    </style>
</head>
<body>

    <div id="role-selection" class="container">
        <h1>Welcome to Event Management</h1>
        <p>Please select your role to continue:</p>
        <div class="role-buttons">
            <button onclick="setRole('user')" class="btn-user">I am a User</button>
            <button onclick="setRole('admin')" class="btn-admin">I am an Admin</button>
        </div>
    </div>

    <div id="app" class="container hidden">
        <header style="display: flex; justify-content: space-between; align-items: center;">
            <h2 id="view-title">Events</h2>
            <button onclick="location.reload()">Switch Role</button>
        </header>

        <section id="admin-controls" class="hidden">
            <h3>Create New Event</h3>
            <form id="event-form">
                <input type="text" id="title" placeholder="Event Title" required>
                <input type="date" id="date" required>
                <textarea id="description" placeholder="Description"></textarea>
                <input type="file" id="eventImage" accept="image/*">
                <button type="submit" class="btn-admin">Post Event</button>
            </form>
            <hr>
        </section>

        <div id="event-list" class="event-grid">
            </div>
    </div>

    <script>
        let currentRole = '';

        // 1. Role Handling - This logic makes the buttons work!
        function setRole(role) {
            currentRole = role;
            
            // Hide selection, show app
            document.getElementById('role-selection').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            
            document.getElementById('view-title').innerText = role === 'admin' ? 'Admin Dashboard' : 'Available Events';
            
            // Show admin tools only if role is admin
            if (role === 'admin') {
                document.getElementById('admin-controls').classList.remove('hidden');
            } else {
                document.getElementById('admin-controls').classList.add('hidden');
            }
            
            fetchEvents();
        }

        // 2. Fetch and Render Events
        async function fetchEvents() {
            try {
                const response = await fetch('/api/events');
                const events = await response.json();
                const list = document.getElementById('event-list');
                list.innerHTML = '';

                events.forEach(event => {
                    const card = document.createElement('div');
                    card.className = 'event-card';
                    card.innerHTML = `
                        ${event.imagePath ? `<img src="${event.imagePath}">` : ''}
                        <h3>${event.title}</h3>
                        <p><strong>Date:</strong> ${event.date}</p>
                        <p>${event.description}</p>
                        <button onclick="joinEvent(${event.id})" style="background:#2ecc71; color:white; border:none; padding:5px 10px;">Join Event</button>
                        ${currentRole === 'admin' ? `<button onclick="deleteEvent(${event.id})" style="background:#e74c3c; color:white; border:none; padding:5px 10px;">Delete</button>` : ''}
                    `;
                    list.appendChild(card);
                });
            } catch (err) {
                console.error("Error fetching events:", err);
            }
        }

        // 3. Admin: Create Event
        document.getElementById('event-form').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('title', document.getElementById('title').value);
            formData.append('date', document.getElementById('date').value);
            formData.append('description', document.getElementById('description').value);
            formData.append('eventImage', document.getElementById('eventImage').files[0]);

            await fetch('/api/events', {
                method: 'POST',
                body: formData
            });
            
            e.target.reset();
            fetchEvents();
        };

        // 4. Admin: Delete Event
        async function deleteEvent(id) {
            if (confirm('Are you sure you want to delete this event?')) {
                await fetch(`/api/events/${id}`, { method: 'DELETE' });
                fetchEvents();
            }
        }

        // 5. Shared: Join Event
        async function joinEvent(id) {
            const userName = prompt("Enter your name to join:");
            if (!userName) return;

            const response = await fetch(`/api/events/${id}/join`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userName })
            });

            if (response.ok) alert('Successfully joined the event!');
        }
    </script>
</body>
</html>
